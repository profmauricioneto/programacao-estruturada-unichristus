<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Alarme JS</title>
</head>

<body>
    <h2>Alarme de Avisos</h2>
    <div>
        <label for="horas">Horas: </label>

    <button onclick="setAlarme">Criar</button>

    <script src="script.js"></script>
